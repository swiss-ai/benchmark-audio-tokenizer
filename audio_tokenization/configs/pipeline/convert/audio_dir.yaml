defaults:
  - _common
  - _self_

family: audio_dir
input:
  audio_root: null
  jsonl_files: []
  audio_ext: .ogg
  min_sr: null
  no_mono_downmix: false
  vad_max_chunk_sec: 200.0
  vad_min_chunk_sec: 5.0
  vad_sample_rate: 16000
  vad_max_merge_gap_sec: 1.0
  vad_max_duration_sec: null
  vad_min_rms_db: null
output:
  # audio_dir is audio-only ingest with no transcripts to tokenize, so
  # text_tokenizer stays null (matches schema default in _common).
  # Forked workers (no per-spawn re-import) are the audio_dir contract:
  # the audio decode hot path benefits from COW shared-memory state.
  mp_start_method: fork
