# Schema-mirroring defaults for the convert stage shared across families.
#
# Every key here matches the corresponding pydantic default in
# audio_tokenization.config.schema.{PrepareOutputSpec, PrepareMetadataSpec}.
# The parity test guards that contract, so changes to schema defaults must
# move this file along with them.
#
# Family-specific YAMLs (wds.yaml, parquet.yaml, ...) compose this via
# `defaults: [_common, _self_]` and add only family-specific overrides
# (input schema, site-pinned text_tokenizer path, mp_start_method=fork for
# audio_dir, etc.).
#
# Content is at top level (no `convert:` wrapper) per Hydra group convention:
# downstream consumers either compose this group as `convert/<family>` (Hydra
# wraps under the group name automatically) or include via dataset-card
# `defaults: [/convert/<family>@convert]`.
enabled: true
output:
  shard_size: 5000
  shar_format: flac
  target_sr: 24000
  text_tokenizer: null
  num_workers: null
  resampling_backend: soxr
  mp_start_method: forkserver
  read_batch_size: 256
metadata:
  audio_column: audio
  text_column: null
  duration_column: null
  source_id_column: null
  clip_num_column: null
  clip_start_column: null
  clip_end_column: null
  clip_duration_column: null
  id_column: null
  id_prefix: null
  language_column: null
  language: null
  custom_columns: []
  constant_custom: {}
  derived_custom: {}
  text_tokenize_custom_columns: []
  input_clip_id_parser: null
  external_metadata: null
  custom_fields: []
  id_field: id
  text_field: text
