tokenize:
  mode: audio_text
  audio_text_format: direct
  audio_text_task: transcribe
  input_shar_dir: null
  partitioning: null
  tokenizer:
    sampling_rate: 24000
    torch_compile: false
    trim_last_tokens: 5
  filter:
    min_duration: 1.0
    max_duration: 200.0
    min_sample_rate: 16000
    min_rms_db: -50
    normalize_peak_db: -3
  dataloader:
    num_workers: 32
    prefetch_factor: 4
    max_batch_duration: 2000.0
    max_batch_cuts: null
    checkpoint_interval_batches: 1000
    num_buckets: 20
    bucket_buffer_size: 20000
    sampler_shuffle: true
    sampler_seed: 42
    quadratic_duration: null
  output:
    output_name: null
    shar_index_filename: shar_index.json
  wandb:
    enabled: true
