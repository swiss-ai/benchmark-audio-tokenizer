defaults:
  - /recipe/parquet_audio_text_interleaved@_here_
  - /tokenizer/apertus_wavtok@_here_
  - _self_

# SRG Apertus — Swiss German news/radio (i4ds dataset).
# 1361 parquet shards, ~553k chunks, ~3552 hours, language=gsw.
# Restricted-distribution dataset; outputs land under SHAR/internal-only/.

name: internal_srg_apertus
language: gsw

source:
  path: /capstor/store/cscs/swissai/infra01/audio-datasets/raw/hf___i4ds___SRG_apertus_data/data
  files: train-*.parquet

columns:
  text: text
  duration: chunk_duration_seconds
  id: [series, episode_id, chunk_index]
  keep: [series, episode_id, speaker_id, episode_name, date]

timeline:
  type: id_parser
  parser: trailing_number

outputs:
  shar_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/internal-only/srg_apertus
  tokenized_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/tokenized/internal-only
  name: srg_apertus
  interleaved_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/tokenized/internal-only/srg_apertus_interleaved

materialization:
  transcribe_ratio: 0.5
  max_seq_len: 8192
