defaults:
  - /recipe/parquet_audio_text_interleaved@_here_
  - /tokenizer/apertus_wavtok@_here_
  - _self_

name: aozora_hurigana
language: ja

source:
  path: /capstor/store/cscs/swissai/infra01/audio-datasets/raw/ndl___aozora_hurigana_speech_v2/parquet
  files: train-*.parquet

columns:
  text: transcription
  duration: null
  id: sample_id
  keep: [sample_id, author, work, rendition, line_num]

timeline:
  type: clip_num
  source_id: source_id
  clip_num: clip_num

outputs:
  shar_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/cooldown/aozora_hurigana
  tokenized_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/tokenized/cooldown
  name: aozora_hurigana
  interleaved_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/tokenized/cooldown/aozora_hurigana_interleaved

materialization:
  # 8 k tokens per sequence — cooldown-wide standard for interleave.
  max_seq_len: 8192
  transcribe_ratio: 0.5
