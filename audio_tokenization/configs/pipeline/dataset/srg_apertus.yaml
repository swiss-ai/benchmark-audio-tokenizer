defaults:
  - _common/pipeline@_here_
  - _common/source_parquet@_here_
  - _common/tokenize_audio_text_interleaved@_here_
  - _common/materialize_interleave@_here_
  - _self_

# SRG Apertus — Swiss German news/radio (i4ds dataset).
# 1361 parquet shards, ~553k chunks, ~3552 hours, language=gsw.
# Sources: Espresso, Regionaljournal AG/SO + BL/BS + BE/FR/VS + ZH/SH + ...
#
# Provenance: contains identifiable speakers + episode metadata.
# Convert into the staging tree first (SHAR/stage_2 + tokenized/cooldown);
# move outputs into SHAR/internal-only and tokenized/internal-only as a
# separate `mv` step once the conversion is verified end-to-end.

name: srg_apertus

convert:
  input:
    parquet_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/raw/hf___i4ds___SRG_apertus_data/data
    parquet_glob: train-*.parquet
  output:
    shar_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/stage_2/srg_apertus
  metadata:
    text_column: text
    duration_column: chunk_duration_seconds
    id_column:
      - series
      - episode_id
      - chunk_index
    language: gsw
    input_clip_id_parser: trailing_number
    custom_columns:
      - series
      - episode_id
      - speaker_id
      - episode_name
      - date

tokenize:
  tokenizer:
    path: /capstor/store/cscs/swissai/infra01/MLLM/tokenizer/apertus_emu3.5_wavtok
  output:
    output_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/tokenized/cooldown
    output_name: srg_apertus

materialize:
  interleave:
    transcribe_ratio: 0.5
    max_seq_len: 8192
    output_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/tokenized/cooldown/srg_apertus_interleaved
