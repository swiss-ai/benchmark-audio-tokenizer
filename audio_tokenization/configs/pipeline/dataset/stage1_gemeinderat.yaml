defaults:
  - /recipe/wds_audio_only@_here_
  - /tokenizer/apertus_wavtok@_here_
  - /profile/cscs@_here_
  - _self_

# Stage-1 Gemeinderat audio-only rebuild.

name: stage1_gemeinderat

source:
  shards:
    - /capstor/store/cscs/swissai/infra01/audio-datasets/raw/Gemeinderat/shards/*.tar
  min_sr: 16000

outputs:
  shar_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/stage_1_rebuild/gemeinderat
  tokenized_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/tokenized/stage_1_rebuild
  name: gemeinderat

conversion:
  num_workers: 20
  shard_size: 2000
  mp_start_method: fork

tokenization:
  min_duration: 1.0
  max_duration: 200.0
  num_workers: 32
  prefetch_factor: 4
  max_batch_duration: 2000.0
  checkpoint_interval_batches: 1000
