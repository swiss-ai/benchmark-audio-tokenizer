defaults:
  - /recipe/wds_audio_only@_here_
  - /tokenizer/apertus_wavtok@_here_
  - /profile/cscs@_here_
  - _self_

# Stage-1 UPS all-language VAD rebuild. Conversion is Slurm-array partitioned;
# tokenization expands node_* SHAR dirs under outputs.shar_dir.

name: stage1_ups_all_lang_vad

source:
  shards:
    - /capstor/store/cscs/swissai/infra01/audio-datasets/raw/unsupervised_peoples_speech_commercial_wds/audio/*.tar
    - /capstor/store/cscs/swissai/infra01/audio-datasets/raw/unsupervised_peoples_speech_commercial_wds/audio2/*.tar
  min_sr: 16000
  vad:
    enabled: true
    per_shard_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/raw/unsupervised_peoples_speech_commercial_wds/vad_results_all_per_shard
    max_chunk_sec: 200.0
    min_chunk_sec: 5.0
    sample_rate: 16000
    max_merge_gap_sec: 2.0
    max_duration_sec: 200.0

outputs:
  shar_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/stage_1_rebuild/ups_all_lang_shar_v3
  tokenized_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/tokenized/stage_1_rebuild
  name: ups_all_lang_vad_v3

conversion:
  enabled: false
  num_workers: 288

tokenization:
  min_duration: 5.0
  max_duration: 200.0
  max_batch_duration: 1000.0
  checkpoint_interval_batches: 2000
