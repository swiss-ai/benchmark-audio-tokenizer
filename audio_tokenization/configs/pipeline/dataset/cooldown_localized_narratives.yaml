defaults:
  - /recipe/parquet_audio_text_direct@_here_
  - /tokenizer/apertus_wavtok@_here_
  - _self_

# Cooldown-stage transcribe pairs from Localized Narratives. The audio
# is the original human-recorded image-description narration. Each row
# is (audio_bytes, caption_asr) where caption_asr is Qwen-Audio's recent
# transcription of that narration — used as the supervision signal here.
# caption_original (an older/legacy ASR pass, NOT human labels) is
# dropped at convert time; wer/cer (caption_asr vs caption_original) are
# kept for downstream quality filtering.
#
# 868,962 clips, ~5,220 hours audio, mean clip 21.6s, sr=48kHz uniform.
# Source coverage: open_images (~3,729h), coco (~1,026h), flickr30k (~310h),
# ade20k (~155h). Verified clean: zero corrupt audio_bytes across full scan.

name: cooldown_localized_narratives
language: en

source:
  path: /capstor/store/cscs/swissai/infra01/audio-datasets/processed/localized_narratives_qwen
  files: result_qwen_*.parquet

columns:
  audio: audio_bytes
  text: caption_asr
  duration: null
  id: null
  language_column: null
  id_prefix: null
  keep:
    - dataset_id
    - image_id
    - annotator_id
    - wer
    - cer
  constant:
    dataset: localized_narratives

outputs:
  shar_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/cooldown/localized_narratives
  tokenized_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/tokenized/cooldown
  name: localized_narratives

conversion:
  enabled: false
  num_workers: 288
  # fork avoids re-importing torch/lhotse per worker (recipe default is
  # forkserver). Convert-time has no CUDA / threads in scope so fork is safe.
  mp_start_method: fork

tokenization:
  # 2 s floor matches the cooldown-wide default. LN's source caption_asr
  # was generated by Qwen-Audio with apparent output-token saturation that
  # silently truncates long-input transcripts. Chars/sec rate by audio
  # duration: 10/s @ 0-30s (natural narrator rate ~12/s), 7.6/s @ 30-60s,
  # 6.2/s @ 60-80s, 5.3/s @ 80-100s, 4.4/s @ 100-120s, 3.4/s @ 120-150s.
  # The drop from 10 -> 5 chars/sec by 80-100s indicates ~half the content
  # is missing from those captions (model also exhibits language drift /
  # script mixing on long inputs). 60 s is the principled signal-quality
  # cap; loses ~6.9% of hours (~350 h) but keeps clean supervision.
  # Empty-caption boundary in source: 0% empty < 100 s, 12% in [100,150),
  # 100% in 150+ s; the 60 s cap stays well clear.
  min_duration: 2.0
  max_duration: 60.0
  max_batch_duration: 2000.0
  checkpoint_interval_batches: 2000
