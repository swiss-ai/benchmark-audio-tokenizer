defaults:
  - /recipe/parquet_sft_audio@_here_
  - /tokenizer/apertus_wavtok@_here_
  - _self_

# HeySQuAD human: 76,148 spoken questions over SQuAD passages.
# 12 native English speakers (5F/7M), no accents, real recordings.
# License: CC-BY-4.0 (commercial OK).
#
# The raw HuggingFace parquets store audio as Struct{bytes, path}; convert reads
# `audio.bytes` directly and decodes duration/sample-rate metadata from bytes.
# Conversations parquet at /processed/sft/.../examples/qa/ has `messages_json`
# with user=<audio>+context, assistant=answer (or a canonical refusal phrase
# for SQuAD-2.0 impossible rows; see the prep script).

name: sft_heysquad_human
language: en

source:
  path: /capstor/store/cscs/swissai/infra01/audio-datasets/raw/hf___yijingwu___HeySQuAD_human/data
  files: "*.parquet"

columns:
  audio: audio.bytes
  duration: null
  id: id
  keep:
    - audio.path
    - question
    - transcription
    - context
    - answers
    - plausible_answers
    - is_impossible
  constant:
    dataset: heysquad_human_sft

outputs:
  shar_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/sft/heysquad_human_audio
  tokenized_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/tokenized/sft
  sft_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/tokenized/sft/heysquad_human
  name: heysquad_human_audio

tokenizer:
  path: /capstor/store/cscs/swissai/infra01/MLLM/tokenizer/apertus_emu3.5_wavtok_instruct

conversion:
  num_workers: 64
  shard_size: 5000
  shar_format: flac

tokenization:
  min_duration: 1.0
  # Spoken questions are short (5-15s); 60s ceiling is generous.
  max_duration: 60.0
  num_workers: 32
  max_batch_duration: 2000.0
  checkpoint_interval_batches: 1000

materialization:
  sft:
    conversations_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/processed/sft/hf___yijingwu___HeySQuAD_human/examples/qa
    max_seq_len: 262144
    seq_threshold: 8192
    messages_column: messages_json
    num_workers: 64
