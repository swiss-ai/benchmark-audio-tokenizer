defaults:
  - /recipe/parquet_sft_audio@_here_
  - /tokenizer/apertus_wavtok@_here_
  - _self_

# HeySQuAD human (accepted slice): 49,850 answerable spoken questions over
# SQuAD passages. 12 native English speakers (5F/7M), real recordings.
# License: CC-BY-4.0.
#
# Companion configs share the same SHAR + audio cache:
#   - heysquad_human_refusal_canonical   (26,298 unanswerable rows, baseline)
#   - heysquad_human_refusal_reasoned    (26,298, LLM-enriched, deferred)
#
# The raw HF parquets store audio as Struct{bytes, path}; convert reads
# `audio.bytes` directly. The conversations parquet under accepted/ has
# extractive answers; refusal rows live in sibling directories.

name: sft_heysquad_human_accepted
language: en

source:
  path: /capstor/store/cscs/swissai/infra01/audio-datasets/raw/hf___yijingwu___HeySQuAD_human/data
  files: "*.parquet"

columns:
  audio: audio.bytes
  duration: null
  id: id
  keep:
    - audio.path
    - question
    - transcription
    - context
    - answers
    - plausible_answers
    - is_impossible
  constant:
    dataset: heysquad_human_sft

outputs:
  shar_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/sft/heysquad_human_audio
  tokenized_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/tokenized/sft
  sft_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/tokenized/sft/heysquad_human_accepted
  name: heysquad_human_audio

tokenizer:
  path: /capstor/store/cscs/swissai/infra01/MLLM/tokenizer/apertus_emu3.5_wavtok_instruct

conversion:
  num_workers: 64
  shard_size: 5000
  shar_format: flac

tokenization:
  min_duration: 1.0
  # Spoken questions are short (5-15s); 60s ceiling is generous.
  max_duration: 60.0
  num_workers: 32
  max_batch_duration: 2000.0
  checkpoint_interval_batches: 1000

materialization:
  sft:
    conversations_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/processed/sft/hf___yijingwu___HeySQuAD_human/accepted
    max_seq_len: 262144
    seq_threshold: 8192
    messages_column: messages_json
    num_workers: 64
