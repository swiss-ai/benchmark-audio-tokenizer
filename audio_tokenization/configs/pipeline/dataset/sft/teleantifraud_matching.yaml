defaults:
  - /recipe/parquet_sft_audio@_here_
  - /tokenizer/apertus_wavtok@_here_
  - _self_

# Self-contained TeleAntiFraud SFT package. The media/audio parquets hold one
# embedded MP3 per audio_id; conversation parquets hold the multi-turn messages.
#
# 13,388 unique audio clips, 33,953 SFT conversations, ~216.4 audio hours.

name: sft_teleantifraud_matching
language: zh

source:
  path: /capstor/store/cscs/swissai/infra01/audio-datasets/processed/sft/ms___JimmyMa99___TeleAntiFraud-28k/matching_sft/media/audio
  files: "audio-*.parquet"

columns:
  audio: audio_bytes
  duration: duration_sec
  id: audio_id
  keep:
    - source_path
    - sha256
    - size_bytes
    - format
    - codec
    - sample_rate
    - channels
  constant:
    dataset: teleantifraud_matching_sft

outputs:
  shar_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/sft/teleantifraud_matching_sft_audio
  tokenized_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/tokenized/sft
  sft_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/tokenized/sft/teleantifraud_matching_sft
  name: teleantifraud_matching_sft_audio

tokenizer:
  path: /capstor/store/cscs/swissai/infra01/MLLM/tokenizer/apertus_emu3.5_wavtok_instruct

conversion:
  num_workers: 64
  shard_size: 5000
  # Source audio is already MP3, but the SHAR/tokenize pipeline expects a
  # normalized 24 kHz recording field; keep this as convert-time normalization.
  shar_format: flac

tokenization:
  min_duration: 1.0
  max_duration: 600.0
  num_workers: 32
  max_batch_duration: 2000.0
  checkpoint_interval_batches: 1000

materialization:
  sft:
    conversations_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/processed/sft/ms___JimmyMa99___TeleAntiFraud-28k/matching_sft/examples
    max_seq_len: 262144
    seq_threshold: 8192
    messages_column: messages_json
    num_workers: 64
