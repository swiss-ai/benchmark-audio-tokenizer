defaults:
  - /recipe/parquet_sft_audio@_here_
  - /tokenizer/apertus_wavtok@_here_
  - _self_

# Speech-only partition of Harland/AudioMCQ-StrongAC-GeminiCoT.
# The source parquets embed one WAV per row and the generated conversation
# parquets keep one question/answer SFT sample per audio_id.

name: sft_audiomcq_gemini_cot_speech
language: en

source:
  path: /capstor/store/cscs/swissai/infra01/audio-datasets/processed/sft/hf___Harland___AudioMCQ-StrongAC-GeminiCoT/data
  files: "speech-train-*.parquet"

columns:
  audio: audio_bytes
  duration: duration_sec
  id: clip_id
  keep:
    - source_dataset
    - source_id
    - question_type
    - audio_path
    - audio_format
    - sampling_rate
    - num_frames
    - question
    - answer
    - answer_index
    - answer_label
  constant:
    dataset: audiomcq_gemini_cot_speech_sft

outputs:
  shar_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/sft/audiomcq_gemini_cot_speech_audio
  tokenized_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/tokenized/sft
  sft_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/tokenized/sft/audiomcq_gemini_cot_speech
  name: audiomcq_gemini_cot_speech_audio

tokenizer:
  path: /capstor/store/cscs/swissai/infra01/MLLM/tokenizer/apertus_emu3.5_wavtok_instruct

conversion:
  num_workers: 64
  shard_size: 5000
  shar_format: flac

tokenization:
  min_duration: 1.0
  max_duration: 60.0
  num_workers: 32
  max_batch_duration: 2000.0
  checkpoint_interval_batches: 1000

materialization:
  sft:
    conversations_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/processed/sft/hf___Harland___AudioMCQ-StrongAC-GeminiCoT/examples/speech_answer_only
    max_seq_len: 262144
    seq_threshold: 8192
    messages_column: messages_json
    num_workers: 64
