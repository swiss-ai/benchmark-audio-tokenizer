defaults:
  - /recipe/parquet_sft_audio@_here_
  - /tokenizer/apertus_wavtok@_here_
  - _self_

# Self-contained Marco LongSpeech SFT package. The media/audio parquets hold
# embedded audio bytes; conversation parquets hold the SFT messages.
#
# 50,176 unique audio clips, 204,881 SFT conversations, ~8,655 audio hours.

name: sft_marco_longspeech

source:
  path: /capstor/store/cscs/swissai/infra01/audio-datasets/processed/sft/hf___AIDC-AI___Marco_Longspeech/media/audio
  files: "audio-*.parquet"

columns:
  audio: audio
  duration: header.duration_sec
  id: audio_id
  constant:
    dataset: marco_longspeech_sft

outputs:
  shar_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/sft/marco_longspeech_sft_audio
  tokenized_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/tokenized/sft
  sft_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/tokenized/sft/marco_longspeech_sft
  name: marco_longspeech_sft_audio

tokenizer:
  path: /capstor/store/cscs/swissai/infra01/MLLM/tokenizer/apertus_emu3.5_wavtok_instruct

conversion:
  num_workers: 64
  shard_size: 512
  shar_format: flac

tokenization:
  min_duration: 1.0
  max_duration: 1300.0
  num_workers: 16
  # Marco's duration distribution is essentially uniform at ~10 min/cut
  # (p01=517s, p99=752s, 97.5% in [600s, 1200s)). The default 20000-cut
  # buffer × ~6 MB/cut at load time exceeds the per-task cgroup ceiling.
  # Bucketing is also a no-op here (zero duration variance to balance
  # against), so a small buffer for shuffle look-ahead is all we need.
  bucket_buffer_size: 2000
  max_batch_duration: 2000.0
  checkpoint_interval_batches: 1000

materialization:
  sft:
    conversations_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/processed/sft/hf___AIDC-AI___Marco_Longspeech/examples
    max_seq_len: 262144
    seq_threshold: 8192
    num_workers: 64
