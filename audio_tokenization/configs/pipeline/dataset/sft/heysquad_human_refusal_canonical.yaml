defaults:
  - /recipe/parquet_sft_audio@_here_
  - /tokenizer/apertus_wavtok@_here_
  - _self_

# HeySQuAD human (refusal_canonical slice): 26,298 unanswerable
# (is_impossible=True) rows. Assistant turn is a canonical refusal phrase
# baseline. License: CC-BY-4.0.
#
# Shares SHAR + audio cache with heysquad_human_accepted. Convert + tokenize
# stages skip via the shared _SUCCESS markers; only materialize runs.
# A reasoned-refusal variant (LLM-enriched <think> traces) will be added as a
# sibling config once the refusal_reasoned/ conversations parquet is populated.

name: sft_heysquad_human_refusal_canonical
language: en

source:
  path: /capstor/store/cscs/swissai/infra01/audio-datasets/raw/hf___yijingwu___HeySQuAD_human/data
  files: "*.parquet"

columns:
  audio: audio.bytes
  duration: null
  id: id
  keep:
    - audio.path
    - question
    - transcription
    - context
    - answers
    - plausible_answers
    - is_impossible
  constant:
    dataset: heysquad_human_sft

outputs:
  shar_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/sft/heysquad_human_audio
  tokenized_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/tokenized/sft
  sft_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/tokenized/sft/heysquad_human_refusal_canonical
  name: heysquad_human_audio

tokenizer:
  path: /capstor/store/cscs/swissai/infra01/MLLM/tokenizer/apertus_emu3.5_wavtok_instruct

conversion:
  num_workers: 64
  shard_size: 5000
  shar_format: flac

tokenization:
  min_duration: 1.0
  max_duration: 60.0
  num_workers: 32
  max_batch_duration: 2000.0
  checkpoint_interval_batches: 1000

materialization:
  sft:
    conversations_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/processed/sft/hf___yijingwu___HeySQuAD_human/refusal_canonical
    max_seq_len: 262144
    seq_threshold: 8192
    messages_column: messages_json
    num_workers: 64
