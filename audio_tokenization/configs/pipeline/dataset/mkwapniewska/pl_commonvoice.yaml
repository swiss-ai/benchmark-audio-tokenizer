defaults:
  - /recipe/parquet_audio_text_direct@_here_
  - /tokenizer/apertus_wavtok@_here_
  - _self_

# Synthetic Polish TTS (VoxCPM2) — pl_commonvoice subset.
# 100 utterances, ~5.4 min of audio. Pre-built SHAR — convert is disabled;
# tokenize consumes the upstream SHAR directly.
#
# Owner-namespaced under dataset/mkwapniewska/ so this ablation set stays
# clearly distinct from production-stage configs.
#
# Override `outputs.tokenized_dir` to a path you can write to, e.g.
#   stage=tokenize outputs.tokenized_dir=/capstor/scratch/cscs/<USER>/tokenized

name: mkwapniewska_pl_commonvoice
language: pl

# Convert is disabled — `source` is required by the recipe schema but never
# read. Keep it pointed at the SHAR root for hygiene; the actual file
# discovery for tokenize comes from `tokenization.input_shar_dir` below.
source:
  path: /capstor/scratch/cscs/mkwapniewska/synthetic-polish-voxcpm2/pl_commonvoice
  files: "*.tar"

conversion:
  enabled: false

tokenization:
  input_shar_dir:
    - /capstor/scratch/cscs/mkwapniewska/synthetic-polish-voxcpm2/pl_commonvoice
  audio_text_task: transcribe

outputs:
  shar_dir: /capstor/scratch/cscs/mkwapniewska/synthetic-polish-voxcpm2/pl_commonvoice
  tokenized_dir: ???   # REQUIRED: override at invocation time
  name: mkwapniewska_pl_commonvoice
