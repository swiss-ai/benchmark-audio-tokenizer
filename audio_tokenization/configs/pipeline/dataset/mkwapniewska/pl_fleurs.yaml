defaults:
  - /recipe/parquet_audio_text_direct@_here_
  - /tokenizer/apertus_wavtok@_here_
  - _self_

# Synthetic Polish TTS (VoxCPM2) — pl_fleurs subset.
# 100 utterances, ~12.1 min of audio. Pre-built SHAR — convert is disabled;
# tokenize consumes the upstream SHAR directly.
#
# Owner-namespaced under dataset/mkwapniewska/ so this ablation set stays
# clearly distinct from production-stage configs.

name: mkwapniewska_pl_fleurs
language: pl

source:
  path: /capstor/scratch/cscs/mkwapniewska/synthetic-polish-voxcpm2/pl_fleurs
  files: "*.tar"

conversion:
  enabled: false

tokenization:
  input_shar_dir:
    - /capstor/scratch/cscs/mkwapniewska/synthetic-polish-voxcpm2/pl_fleurs
  audio_text_task: transcribe

outputs:
  shar_dir: /capstor/scratch/cscs/mkwapniewska/synthetic-polish-voxcpm2/pl_fleurs
  tokenized_dir: ???   # REQUIRED: override at invocation time
  name: mkwapniewska_pl_fleurs
