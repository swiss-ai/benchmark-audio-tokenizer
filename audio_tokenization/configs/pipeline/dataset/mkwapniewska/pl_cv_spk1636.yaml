defaults:
  - /recipe/parquet_audio_text_direct@_here_
  - /tokenizer/apertus_wavtok@_here_
  - _self_

# Synthetic Polish ASR (VoxCPM2, speaker 1636) — CommonVoice subset.
# 23,510 utterances, 32.8 h. HF-style parquet with `audio`/`text`/`duration`.

name: mkwapniewska_pl_cv_spk1636
language: pl

source:
  path: /capstor/store/cscs/swissai/infra01/audio-datasets/synthesized/voxcpm2/pl_cv_spk1636/data
  files: "train-*.parquet"

columns:
  audio: audio
  text: text
  duration: duration
  id: id
  language_column: language
  constant:
    dataset: voxcpm2_pl_cv_spk1636

outputs:
  shar_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/reality_gap/SHAR/voxcpm2/pl_cv_spk1636
  tokenized_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/reality_gap/tokenized/voxcpm2/pl_cv_spk1636
  name: voxcpm2_pl_cv_spk1636

tokenization:
  min_duration: 1.0
  max_duration: 60.0
