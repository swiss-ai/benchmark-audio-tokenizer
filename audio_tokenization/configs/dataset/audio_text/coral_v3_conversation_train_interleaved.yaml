# CoRal v3 conversation train split — audio-text interleaved tokenization.
dataset_name: coral_v3_conversation
output_name: coral_v3_conversation_train_interleaved_normalized
clip_id_parser: coral

shar_dir:
  - /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/stage_2/coral_v3_conversation_train
shar_index_filename: shar_index.json

# Filtering
min_duration: 0.1
max_duration: 200.0
min_sample_rate: 16000
min_rms_db: -40               # drop clips quieter than -40 dB (near-silence)
normalize_rms_db: -3           # peak normalize to -3 dBFS (matches WavTokenizer training)

# Dynamic bucketing sampler
max_batch_duration: 2000.0
num_buckets: 40
bucket_buffer_size: 20000
sampler_shuffle: true
sampler_seed: 42

# DataLoader
num_workers: 32
prefetch_factor: 4

# Checkpointing
checkpoint_interval_batches: 5000
