# CoRal v3 read_aloud train split — audio-text direct tokenization.
dataset_name: coral_v3_read_aloud
output_name: coral_v3_read_aloud_train_direct

shar_dir:
  - /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/stage_2/coral_v3_read_aloud_train
shar_index_filename: shar_index.json

# Filtering
min_duration: 0.1
max_duration: 200.0
min_sample_rate: 16000

# Dynamic bucketing sampler
max_batch_duration: 1500.0
num_buckets: 40
bucket_buffer_size: 20000
sampler_shuffle: true
sampler_seed: 42

# DataLoader
num_workers: 32
prefetch_factor: 4

# Checkpointing
checkpoint_interval_batches: 5000
