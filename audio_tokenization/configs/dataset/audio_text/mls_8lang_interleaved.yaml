# MLS (Multilingual LibriSpeech) 8 languages — audio-text interleaved tokenization.
dataset_name: mls
output_name: mls_8lang_interleaved

shar_dir:
  - /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/stage_2/mls/mls_dutch_train
  - /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/stage_2/mls/mls_english_train
  - /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/stage_2/mls/mls_french_train
  - /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/stage_2/mls/mls_german_train
  - /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/stage_2/mls/mls_italian_train
  - /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/stage_2/mls/mls_polish_train
  - /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/stage_2/mls/mls_portuguese_train
  - /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/stage_2/mls/mls_spanish_train
shar_index_filename: shar_index.json

# Filtering
min_duration: 0
max_duration: 200.0
min_sample_rate: 16000

# Dynamic bucketing sampler
max_batch_duration: 2000.0
num_buckets: 40
bucket_buffer_size: 20000
sampler_shuffle: true
sampler_seed: 42

# DataLoader
num_workers: 40
prefetch_factor: 4

# Checkpointing
checkpoint_interval_batches: 5000
