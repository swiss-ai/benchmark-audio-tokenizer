# LegCo speech train split — audio-text interleaved tokenization.
dataset_name: legco_speech
output_name: legco_speech_train_interleaved
clip_id_parser: legco

shar_dir:
  - /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/stage_2/legco_speech_train/node_00
  - /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/stage_2/legco_speech_train/node_01
  - /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/stage_2/legco_speech_train/node_02
  - /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/stage_2/legco_speech_train/node_03
shar_index_filename: shar_index.json

# Filtering
min_duration: 0.1
max_duration: 200.0
min_sample_rate: 16000

# Dynamic bucketing sampler
max_batch_duration: 2000.0
num_buckets: 20
bucket_buffer_size: 20000
sampler_shuffle: true
sampler_seed: 42

# DataLoader
num_workers: 32
prefetch_factor: 4

# Checkpointing
checkpoint_interval_batches: 5000
